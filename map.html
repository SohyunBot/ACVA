 var autoIcon = L.icon({
    iconUrl: 'auto_icoon.png',
    iconSize: [32, 32],
    
    popupAnchor: [-3, -76],
    
});
 
var bikeIcon = L.icon({
    iconUrl: 'fiets_icoon.png',
    iconSize: [32, 32],
    
    popupAnchor: [-3, -76],
   
});
var bakfietsIcon = L.icon({
    iconUrl: 'bakfiets_icoon.png',
    iconSize: [32, 32],
    
    popupAnchor: [-3, -76],
    
});
var scooterIcon = L.icon({
    iconUrl: 'scooter_icoon.png',
    iconSize: [32, 32],
 
    popupAnchor: [-3, -76],
    
});


        
// create the GeoJSON layer and call the styling function with each marker




var vehicleLayer = L.geoJSON(vehicles, {

  pointToLayer: function (feature, latlng) {

    return L.marker(latlng, {
      icon: iconByVehicle(feature)
    });

  }, onEachFeature: function (feature, layer) {

    const p = feature.properties;

    layer.bindPopup(`
      <b>${p.provider} ${p.vehicle}</b><br><br>

      €${p.price_per_20min_eur} per 20 min
      
    `);

  }

}).addTo(map);

function iconByVehicle(feature) {

  if (feature.properties.type === "car") {
    return autoIcon;

  } else if (feature.properties.type === "bakfiets") {
    return bakfietsIcon;

  } else if (feature.properties.type === "scooter") {
    return scooterIcon;
  }

  return bikeIcon;
}
